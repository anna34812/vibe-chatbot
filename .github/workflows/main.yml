name: Deploy on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 환경 정보 출력
        run: |
          echo "===== 배포 시작 ====="
          echo "브랜치: ${{ github.ref_name }}"
          echo "커밋: ${{ github.sha }}"
          echo "작성자: ${{ github.actor }}"
          echo "시간: $(date)"

      - name: 파일 목록 확인
        run: ls -la

      - name: 배포 완료
        run: echo "===== 배포 완료 ====="
